<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>password checking</title>
    <style>
      p {
        font-size: 20px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <p>
      COndition : Password should start from ther alphabet(letters like A,a B,b
      ...) and ends in a number (0-9) and may contain anything in between
    </p>
  </body>
</html>
<script>
  const password = "Hello12";

  const firstChar = password[0];
  const lastChar = password[password.length - 1];

  const firstMatch = /[A-Za-z]/.test(firstChar);
  const lastMatch = /[0-9]/.test(lastChar);

  if (firstMatch && lastMatch) {
    console.log("Match");
  } else {
    console.log("Error");
  }
</script>
